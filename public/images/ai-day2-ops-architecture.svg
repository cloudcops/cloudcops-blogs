  <rect x="600" y="290" width="270" height="190" rx="6" fill="#1a1a2e" stroke="#fff" stroke-width="1"/>
  <text x="615" y="315" fill="#fff" font-size="11" font-weight="700" letter-spacing="2">06</text>
  <text x="615" y="338" fill="#fff" font-size="17" font-weight="700">GitOps for AI</text>
  <text x="615" y="362" fill="#888" font-size="12">Prompts in version control</text>
  <text x="615" y="380" fill="#888" font-size="12">PR-reviewed config changes</text>
  <text x="615" y="398" fill="#888" font-size="12">Model version pinning</text>
  <text x="615" y="416" fill="#888" font-size="12">Canary prompt deploys</text>
