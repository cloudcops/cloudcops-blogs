  <text x="660" y="464" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">ONGOING</text>

  <!-- Footer -->
  <text x="450" y="530" text-anchor="middle" fill="#334" font-size="11">cloudcops.de</text>
