  <text x="45" y="105" fill="#cc7832" font-size="11" font-weight="700" letter-spacing="2">01</text>
  <text x="45" y="128" fill="#fff" font-size="17" font-weight="700">Secrets Management</text>
  <text x="45" y="152" fill="#888" font-size="12">External Secrets Operator</text>
