  <text x="330" y="362" fill="#888" font-size="12">AI-specific runbooks</text>
  <text x="330" y="380" fill="#888" font-size="12">Kill switches per feature</text>
  <text x="330" y="398" fill="#888" font-size="12">Escalation paths</text>
  <text x="330" y="416" fill="#888" font-size="12">Hallucination playbook</text>
  <text x="330" y="434" fill="#888" font-size="12">Provider outage response</text>
  <rect x="330" y="450" width="90" height="20" rx="3" fill="#110022" stroke="#9966cc" stroke-width="1"/>
  <text x="375" y="464" text-anchor="middle" fill="#9966cc" font-size="10" font-weight="600">WEEK 2</text>

